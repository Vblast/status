# Upptime configuration for Vblast — https://upptime.js.org/docs/configuration
#
# This file lives in a SEPARATE GitHub repo (not the vblast app repo).
# See UPPTIME-SETUP.md for the one-time setup steps.

# GitHub repo that hosts the status page + uptime history.
owner: Vblast          # GitHub org/user (github.com/Vblast)
repo: status           # repo name -> Vblast/status

# Endpoints to monitor. Upptime checks each every ~5 min via GitHub Actions
# and records response time + up/down history.
sites:
  - name: Vblast App (dashboard)
    url: https://app.vblast.net/api/health   # 200/503 from real DB-connectivity check
  - name: Vblast Click-to-call / QR handoff
    url: https://app.vblast.net               # dashboard + /q short-link host
  - name: Vblast Marketing Site
    url: https://vblast.net

# Public status website (built by upptime, deployed to GitHub Pages).
status-website:
  cname: status.vblast.net        # set the matching CNAME in GoDaddy (see SETUP)
  name: Vblast Status
  introTitle: "Vblast Service Status"
  introMessage: "Live status and uptime history for the Vblast platform. Subscribe or check here during any incident."
  logoUrl: https://vblast.net/favicon.ico
  navbar:
    - title: Status
      href: /
    - title: Vblast
      href: https://vblast.net
    - title: Support
      href: "mailto:support@vblast.net"

# Optional: who gets auto-assigned to the GitHub issue opened on an outage.
assignees:
  - gipper2k

# Notifications (optional). Upptime can open GitHub issues on downtime by
# default; you can also wire Slack/SMS/email later via the `notifications:` key.
# Docs: https://upptime.js.org/docs/notifications
